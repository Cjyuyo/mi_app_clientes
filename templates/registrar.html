{% extends 'base_sidebar.html' %}
{% block title %}Registrar Nuevo Cliente{% endblock %}

{% block body %}
<div class="max-w-5xl mx-auto font-sans py-8 px-4">
    <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-200 mb-6">
        <h1 class="text-2xl font-bold text-slate-800">Registrar Nuevo Cliente</h1>
        <p class="text-slate-500 text-sm">Completa los campos para crear un nuevo perfil.</p>
    </div>

    <form id="registroForm" action="{{ url_for('registrar_cliente') }}" method="POST" class="space-y-6">
        <input type="hidden" name="asesor" id="asesor-hidden-input" required>
        <input type="hidden" name="responsable" id="responsable-hidden-input" required>

        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
            <h3 class="text-lg font-bold text-slate-800 mb-4 pb-3 border-b">Información Administrativa</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-4">
                <div>
                    <label for="asesor-select" class="block text-sm font-medium text-slate-700">Asesor</label>
                    <select id="asesor-select" class="mt-1 block w-full rounded-md border-slate-300 bg-slate-50 shadow-sm" required>
                        <option value="" selected disabled>-- Seleccione --</option>
                        {% for r in responsables %}
                            <option value="{{ r.nombre_completo }}">{{ r.nombre_completo }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label for="responsable-select" class="block text-sm font-medium text-slate-700">Responsable</label>
                    <select id="responsable-select" class="mt-1 block w-full rounded-md border-slate-300 bg-slate-50 shadow-sm" required>
                        <option value="" selected disabled>-- Seleccione --</option>
                        {% for r in responsables %}
                            <option value="{{ r.nombre_completo }}">{{ r.nombre_completo }}</option>
                        {% endfor %}
                    </select>
                </div>
                </div>
        </div>
        
        <div class="flex flex-col sm:flex-row justify-end gap-3 pt-4">
            <a href="{{ url_for('hub') }}" class="w-full sm:w-auto text-center bg-white text-slate-700 font-semibold py-2.5 px-5 border rounded-lg">Cancelar</a>
            <button type="submit" id="submitBtn" class="w-full sm:w-auto bg-blue-600 text-white font-bold py-2.5 px-6 rounded-lg" disabled>Continuar</button>
        </div>
    </form>
</div>
{% endblock %}

{% block scripts_extra %}
<script>
    document.addEventListener('DOMContentLoaded', function() {
        // --- Lógica Simplificada ---
        const asesorSelect = document.getElementById('asesor-select');
        const responsableSelect = document.getElementById('responsable-select');
        const asesorHiddenInput = document.getElementById('asesor-hidden-input');
        const responsableHiddenInput = document.getElementById('responsable-hidden-input');

        asesorSelect.addEventListener('change', () => {
            asesorHiddenInput.value = asesorSelect.value;
            asesorHiddenInput.dispatchEvent(new Event('input', { bubbles: true }));
        });
        responsableSelect.addEventListener('change', () => {
            responsableHiddenInput.value = responsableSelect.value;
            responsableHiddenInput.dispatchEvent(new Event('input', { bubbles: true }));
        });

        // (Aquí va el resto del JavaScript para validación, cámara, etc.)
    });
</script>
{% endblock %}
