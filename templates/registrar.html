<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registrar Nuevo Cliente</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto bg-white p-8 rounded-xl shadow-lg">
        <h1 class="text-3xl font-bold text-gray-800 mb-6">Registrar Nuevo Cliente</h1>
        <form action="{{ url_for('registrar_cliente') }}" method="POST">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div><label class="block text-sm font-medium text-gray-700">Nombre Completo</label><input type="text" name="nombre" required class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm"></div>
                <div><label class="block text-sm font-medium text-gray-700">Cédula</label><input type="text" name="cedula" class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm"></div>
                <div><label class="block text-sm font-medium text-gray-700">N° Contrato</label><input type="text" name="contrato" class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm"></div>
                <div><label class="block text-sm font-medium text-gray-700">Teléfono</label><input type="text" name="telefono" class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm"></div>
                <div><label class="block text-sm font-medium text-gray-700">Fecha de Ingreso</label><input type="date" name="fecha_ingreso" class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm"></div>
                <div><label class="block text-sm font-medium text-gray-700">Monto Total del Plan ($)</label><input type="number" step="0.01" name="monto_total" required class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm"></div>
                <div><label class="block text-sm font-medium text-gray-700">Número de Cuotas</label><input type="number" name="numero_cuotas" value="24" required class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm"></div>
                <div><label class="block text-sm font-medium text-gray-700">Monto Inscripción ($)</label><input type="number" step="0.01" name="monto_inscripcion" value="0" class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm"></div>
                <div class="md:col-span-2"><label class="block text-sm font-medium text-gray-700">Bien Solicitado</label><input type="text" name="bien_solicitado" class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm"></div>
                <div class="md:col-span-2"><label class="block text-sm font-medium text-gray-700">Asesor</label><input type="text" name="asesor" class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm"></div>
            </div>
            <div class="mt-8 flex justify-end gap-4">
                <a href="{{ url_for('index') }}" class="bg-gray-200 text-gray-800 font-bold py-2 px-6 rounded-lg hover:bg-gray-300 transition">Cancelar</a>
                <button type="submit" class="bg-blue-600 text-white font-bold py-2 px-6 rounded-lg hover:bg-blue-700 transition">Registrar Cliente</button>
            </div>
        </form>
    </div>
</body>
</html>
