<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %} | Sistema de Gestión</title>
    
    <!-- Bootstrap CSS y Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --azul-corporativo: #2B3A55;
            --azul-hover: #364766;
            --gris-fondo: #f4f7f6;
            --blanco: #FFFFFF;
            --texto-claro: #adb5bd;
            --texto-blanco: #f8f9fa;
            --borde-sutil: #e9ecef;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--gris-fondo);
        }

        .wrapper {
            display: flex;
            width: 100%;
            min-height: 100vh;
        }

        /* --- Estilos del Sidebar --- */
        #sidebar {
            width: 260px;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            z-index: 999;
            background: var(--azul-corporativo);
            color: var(--texto-blanco);
            transition: all 0.3s;
            box-shadow: 3px 3px 10px rgba(0, 0, 0, 0.1);
        }

        .sidebar-header {
            padding: 20px;
            background: var(--azul-corporativo);
            text-align: center;
            border-bottom: 1px solid var(--azul-hover);
        }
        
        .sidebar-header h3 {
            font-weight: 700;
        }

        #sidebar ul.components {
            padding: 20px 0;
        }

        #sidebar ul p {
            color: var(--texto-blanco);
            padding: 10px;
        }

        #sidebar ul li a {
            padding: 12px 20px;
            font-size: 1.05em;
            display: block;
            color: var(--texto-claro);
            border-left: 3px solid transparent;
            transition: all 0.2s;
        }

        #sidebar ul li a:hover {
            color: var(--texto-blanco);
            background: var(--azul-hover);
            border-left: 3px solid var(--naranja-corporativo, #F99417);
        }

        #sidebar ul li.active > a, a[aria-expanded="true"] {
            color: var(--texto-blanco);
            background: var(--azul-hover);
            border-left: 3px solid var(--naranja-corporativo, #F99417);
        }
        
        #sidebar ul li a i {
            margin-right: 10px;
        }

        /* --- Estilos del Contenido Principal --- */
        #content {
            width: calc(100% - 260px);
            padding: 20px;
            min-height: 100vh;
            transition: all 0.3s;
            position: absolute;
            top: 0;
            right: 0;
        }
        
        /* --- Estilos del Header Superior --- */
        .topbar {
            background: var(--blanco);
            border-radius: .5rem;
            padding: 10px 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        /* --- Responsividad --- */
        @media (max-width: 768px) {
            #sidebar {
                margin-left: -260px;
            }
            #sidebar.active {
                margin-left: 0;
            }
            #content {
                width: 100%;
            }
            .topbar .d-md-inline {
                display: none !important;
            }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <!-- Sidebar -->
    <nav id="sidebar">
        <div class="sidebar-header">
            <h3>Sistema de Gestión</h3>
        </div>

        <ul class="list-unstyled components">
            <p>Menú Principal</p>
            <!-- Aquí irían los enlaces a tus 33 plantillas -->
            <!-- Ejemplo de cómo se vería -->
            <li class="active">
                <a href="{{ url_for('index') }}"><i class="bi bi-people-fill"></i> Gestión de Clientes</a>
            </li>
            <li>
                <a href="#"><i class="bi bi-calculator-fill"></i> Flujo de Caja</a>
            </li>
            <li>
                <a href="#"><i class="bi bi-check2-circle"></i> Centro de Conciliación</a>
            </li>
            <li>
                <a href="#"><i class="bi bi-inbox-fill"></i> Gestión de Solicitudes</a>
            </li>
             <li>
                <a href="#"><i class="bi bi-pie-chart-fill"></i> Métricas del Negocio</a>
            </li>
            <!-- Agrega el resto de tus 33 enlaces aquí -->
        </ul>
    </nav>

    <!-- Contenido de la Página -->
    <div id="content">
        <!-- Barra superior con botón de menú y datos de usuario -->
        <nav class="navbar navbar-expand-lg navbar-light topbar">
            <div class="container-fluid">
                <button type="button" id="sidebarCollapse" class="btn btn-dark d-md-none">
                    <i class="bi bi-list"></i>
                </button>

                <div class="ms-auto d-flex align-items-center">
                    {% if g.admin %}
                        <span class="navbar-text me-3 d-none d-md-inline">
                            <i class="bi bi-person-circle"></i> Bienvenido, {{ g.admin.usuario }}
                        </span>
                        <a href="{{ url_for('admin_logout') }}" class="btn btn-outline-danger btn-sm">
                            <i class="bi bi-box-arrow-right me-1"></i> Cerrar Sesión
                        </a>
                    {% else %}
                        <a href="{{ url_for('admin_login') }}" class="btn btn-outline-primary btn-sm">Iniciar Sesión</a>
                    {% endif %}
                </div>
            </div>
        </nav>

        <!-- Bloque de contenido que cambiará en cada página -->
        <div class="main-content p-3 bg-white rounded shadow-sm">
             {% block body %}
             {% endblock %}
        </div>
        
    </div>
</div>

<!-- Scripts de JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Script para mostrar/ocultar el sidebar en móviles
    document.addEventListener('DOMContentLoaded', function () {
        document.getElementById('sidebarCollapse').addEventListener('click', function () {
            document.getElementById('sidebar').classList.toggle('active');
        });
    });
</script>

</body>
</html>
