 {% block scripts_extra %}
 <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
 <script>
     // LA LÓGICA DE JAVASCRIPT Y CHART.JS NO SE HA MODIFICADO
     document.addEventListener('DOMContentLoaded', function () {
         Chart.defaults.font.family = "'Inter', 'sans-serif'";
         Chart.defaults.color = '#64748b'; // slate-500
 
         // --- GRÁFICO DE INGRESOS ---
         const ingresosCtx = document.getElementById('ingresosChart').getContext('2d');
         new Chart(ingresosCtx, {
             type: 'bar',
             data: {
-                data: {{ metrics.ingresos_ultimos_meses.values|tojson|safe }},
+                labels: {{ metrics.ingresos_ultimos_meses['labels']|tojson|safe }},
                 datasets: [{
                     label: 'Ingresos ($)',
-                    data: {{ metrics.ingresos_ultimos_meses.values|tojson|safe }},
+                    data: {{ metrics.ingresos_ultimos_meses['values']|tojson|safe }},
                     backgroundColor: 'rgba(59, 130, 246, 0.7)',
                     borderColor: 'rgba(59, 130, 246, 1)',
                     borderWidth: 1,
                     borderRadius: 8,
                     barPercentage: 0.6,
                     categoryPercentage: 0.8
                 }]
             },
             options: {
                 responsive: true,
                 maintainAspectRatio: false,
                 scales: {
                     y: {
                         beginAtZero: true,
                         grid: {
                             color: '#e2e8f0' // slate-200
                         },
                         ticks: {
                             callback: function(value) {
                                 return '$' + new Intl.NumberFormat().format(value);
                             }
                         }
                     },
                     x: {
                         grid: {
                             display: false
                         }
                     }
                 },
                 plugins: {
                     legend: {
                         display: false
                     },
                     tooltip: {
                         backgroundColor: '#1e293b', // slate-800
                         titleFont: { size: 14, weight: 'bold' },
                         bodyFont: { size: 12 },
                         padding: 12,
                         cornerRadius: 8,
                         displayColors: false
                     }
                 }
             }
         });
 
         // --- GRÁFICO DE COMPOSICIÓN ---
         const composicionCtx = document.getElementById('composicionChart').getContext('2d');
         new Chart(composicionCtx, {
             type: 'doughnut',
             data: {
-                labels: {{ metrics.composicion_clientes['labels']|tojson|safe }},
+                labels: {{ metrics.composicion_clientes['labels']|tojson|safe }},
                 datasets: [{
                     label: 'Clientes',
-                    data: {{ metrics.composicion_clientes['values']|tojson|safe }},
+                    data: {{ metrics.composicion_clientes['values']|tojson|safe }},
                     backgroundColor: [
                         '#3b82f6', // blue-500
                         '#10b981', // emerald-500
                         '#f59e0b', // amber-500
                         '#8b5cf6', // violet-500
                         '#ef4444', // red-500
                         '#64748b', // slate-500
                         '#ec4899'  // pink-500
                     ],
                     borderColor: '#fff',
                     borderWidth: 4,
                     hoverOffset: 8
                 }]
             },
             options: {
                 responsive: true,
                 maintainAspectRatio: false,
                 plugins: {
                     legend: {
                         position: 'bottom',
                         labels: {
                             padding: 20,
                             boxWidth: 12,
                             usePointStyle: true,
                             pointStyle: 'circle'
                         }
                     },
                     tooltip: {
                         backgroundColor: '#1e293b',
                         titleFont: { size: 14, weight: 'bold' },
                         bodyFont: { size: 12 },
                         padding: 12,
                         cornerRadius: 8,
                     }
                 }
             }
         });
     });
 </script>
 {% endblock %}
