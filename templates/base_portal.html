<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %} | Portal del Cliente</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Bootstrap Icons (para los iconos) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        /* Estilos para dar "vida" y un "marco" visual al portal */
        @keyframes slow-pan {
            0% { transform: translate(0, 0); }
            25% { transform: translate(20px, -10px); }
            50% { transform: translate(40px, 0px); }
            75% { transform: translate(20px, 10px); }
            100% { transform: translate(0, 0); }
        }

        .aurora-background {
            position: relative;
            overflow-x: hidden;
        }

        .aurora-background::before,
        .aurora-background::after {
            content: '';
            position: absolute;
            width: 50vw;
            height: 50vh;
            border-radius: 50%;
            opacity: 0.1;
            filter: blur(100px);
            z-index: 0;
            animation: slow-pan 25s linear infinite;
        }

        .aurora-background::before {
            background: radial-gradient(circle, #3b82f6, transparent 70%);
            top: -10%;
            left: -15%;
        }

        .aurora-background::after {
            background: radial-gradient(circle, #14b8a6, transparent 70%);
            bottom: -10%;
            right: -15%;
            animation-delay: -12.5s;
        }
    </style>
    {% block head_extra %}{% endblock %}
</head>
<body class="bg-slate-50 text-slate-800 aurora-background">

<div class="min-h-screen flex flex-col relative z-10">
    <!-- Encabezado -->
    <header class="bg-white/50 backdrop-blur-sm shadow-sm sticky top-0 z-50">
        <nav class="container mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-center items-center h-20">
                <a href="{{ url_for('portal_dashboard') }}">
                    <img src="{{ url_for('static', filename='Moto Plan Motors.png') }}" alt="Logo Moto Plan Motors" class="h-10">
                </a>
            </div>
        </nav>
    </header>

    <!-- Contenido Principal -->
    <main class="flex-grow container mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="max-w-7xl mx-auto">
            {% block body %}{% endblock %}
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white/50 backdrop-blur-sm mt-8">
        <div class="max-w-7xl mx-auto py-4 px-4 sm:px-6 lg:px-8 text-center">
            <p class="text-sm text-slate-500">&copy; {{ g.anio_actual | default('2024') }} - Moto Plan Motors. Todos los derechos reservados.</p>
        </div>
    </footer>
</div>

{% block scripts_extra %}{% endblock %}

</body>
</html>
