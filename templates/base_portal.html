<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %} | Portal del Cliente</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc; /* slate-50 */
             /* Añadido: Espacio para la barra de navegación inferior en móviles */
            padding-bottom: 72px;
        }

        @media (min-width: 768px) {
            body {
                 /* Removido: Quitar el padding en vistas de escritorio */
                padding-bottom: 0;
            }
        }

        .sidebar-link {
            transition: background-color 0.2s ease, color 0.2s ease;
        }
        .sidebar-link.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        /* Estilos para los íconos en la barra inferior móvil */
        .mobile-nav-link {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0.5rem;
            color: #cbd5e1; /* slate-300 */
            transition: color 0.2s ease;
            flex-grow: 1;
        }
        .mobile-nav-link:hover {
            color: #ffffff;
        }
        .mobile-nav-link i {
            font-size: 1.5rem; /* 24px */
        }
        .mobile-nav-link span {
            font-size: 0.75rem; /* 12px */
            margin-top: 0.25rem;
        }
    </style>
    {% block head_extra %}{% endblock %}
</head>
<body class="bg-slate-50">

<div class="flex h-screen">
    <aside class="w-64 flex-shrink-0 flex-col text-white bg-slate-800 hidden md:flex">
        <div class="flex items-center justify-center h-20 border-b border-slate-700">
            <a href="{{ url_for('portal_dashboard') }}">
                <img src="{{ url_for('static', filename='Moto Plan Motors.png') }}" alt="Logo Moto Plan Motors" class="h-16">
            </a>
        </div>

        <nav class="flex-1 px-2 py-4 space-y-2">
            {% block sidebar_actions %}
            {% endblock %}
        </nav>
    </aside>

    <div class="flex-1 flex flex-col overflow-hidden">
        <header class="sticky top-0 z-10 bg-white/80 backdrop-blur-lg border-b border-slate-200/60">
            <div class="flex items-center justify-between h-20 px-4 md:px-6">
                <h1 class="text-xl font-semibold text-slate-900">
                    {% block page_title %}Mi Portal{% endblock %}
                </h1>
                <div x-data="{ open: false }" class="relative">
                    <button @click="open = !open" class="flex items-center space-x-2 p-2 rounded-full hover:bg-slate-200/50">
                        <span class="font-semibold text-sm text-slate-700 hidden sm:block">{{ session.cliente_nombre }}</span>
                        <i class="bi bi-person-circle text-2xl text-slate-600"></i>
                    </button>
                    <div x-show="open" @click.away="open = false" x-transition
                         class="absolute right-0 mt-2 w-48 bg-white/95 backdrop-blur-sm rounded-md shadow-lg py-1 z-50 border border-slate-200">
                        <a href="{{ url_for('portal_logout') }}" class="flex items-center w-full px-4 py-2 text-sm text-red-600 hover:bg-red-500/10 rounded-md">
                            <i class="bi bi-box-arrow-right mr-2"></i>Cerrar Sesión
                        </a>
                    </div>
                </div>
            </div>
        </header>

        <main class="flex-1 overflow-x-hidden overflow-y-auto p-4 md:p-6">
            <div class="max-w-7xl mx-auto">
                {% block body %}{% endblock %}
            </div>
        </main>
    </div>
</div>

<nav class="fixed bottom-0 left-0 right-0 h-18 bg-slate-800 flex justify-around items-stretch z-30 md:hidden">
    {% block sidebar_actions %}{% endblock %}
</nav>


<script src="//unpkg.com/alpinejs" defer></script>

<script>
    // AÑADIDO: Script para transformar los enlaces de la sidebar en formato móvil
    document.addEventListener('DOMContentLoaded', function () {
        const mobileNav = document.querySelector('nav.md:hidden');
        if (mobileNav) {
            // Selecciona todos los enlaces directos dentro del nav móvil
            const links = mobileNav.querySelectorAll('a');
            links.forEach(link => {
                // Aplica la clase para el estilo de ícono y texto vertical
                link.classList.add('mobile-nav-link');
                
                // Extrae el ícono y el span de texto
                const icon = link.querySelector('i');
                const text = link.querySelector('span');

                // Reorganiza el contenido para el formato móvil si es necesario
                if (icon && text) {
                    link.innerHTML = ''; // Limpia el contenido
                    link.appendChild(icon);
                    link.appendChild(text);
                }
            });
        }
    });
</script>


{% block scripts_extra %}{% endblock %}

</body>
</html>
