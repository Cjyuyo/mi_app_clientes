<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %} | Portal del Cliente</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc; /* slate-50 */
        }
        /* Estilos de la barra lateral para transiciones suaves */
        .sidebar-link {
            transition: background-color 0.2s ease, color 0.2s ease;
        }
    </style>
    {% block head_extra %}{% endblock %}
</head>
<body class="main-content-bg">

<div class="flex h-screen">
    <!-- Sidebar con efecto vidrio (glassmorphism) -->
    <aside class="w-64 flex-shrink-0 flex flex-col text-white bg-orange-500/80 backdrop-blur-lg border-r border-white/20">
        <!-- Logo -->
        <div class="flex items-center justify-center h-20">
            <a href="{{ url_for('portal_dashboard') }}">
                <img src="{{ url_for('static', filename='Moto Plan Motors.png') }}" alt="Logo Moto Plan Motors" class="h-16">
            </a>
        </div>

        <!-- Contenido del Sidebar -->
        <div class="flex flex-col flex-grow p-4">
            <div class="text-center mb-6">
                <h2 class="text-xl font-semibold text-white">{{ session.cliente_nombre }}</h2>
                <p class="text-sm text-orange-100">¡Bienvenido!</p>
            </div>
            
            <nav class="flex-grow">
                <ul class="space-y-2">
                    {% block sidebar_actions %}
                    <!-- Los botones de acción se insertarán aquí desde el dashboard -->
                    {% endblock %}
                </ul>
            </nav>

            <!-- Botón de Salir -->
            <div class="mt-auto">
                 <a href="{{ url_for('portal_logout') }}" class="sidebar-link flex items-center gap-3 w-full text-left py-2 px-3 rounded-md text-orange-100 hover:bg-white/20 hover:text-white">
                    <i class="bi bi-box-arrow-right text-lg"></i>
                    <span>Salir</span>
                </a>
            </div>
        </div>
    </aside>

    <!-- Contenido Principal -->
    <div class="flex-1 flex flex-col overflow-hidden">
        <!-- Header Fijo con Efecto Vidrio -->
        <header class="sticky top-0 z-10 bg-slate-50/80 backdrop-blur-lg border-b border-slate-200/60">
            <div class="px-4 md:px-6 py-4">
                <h1 class="text-xl font-semibold text-slate-900">
                    {% block page_title %}Mi Portal{% endblock %}
                </h1>
            </div>
        </header>

        <!-- Área de Contenido con Scroll -->
        <main class="flex-1 overflow-x-hidden overflow-y-auto p-4 md:p-6">
            <div class="max-w-7xl mx-auto">
                {% block body %}{% endblock %}
            </div>
        </main>
    </div>
</div>

{% block scripts_extra %}{% endblock %}

</body>
</html>
