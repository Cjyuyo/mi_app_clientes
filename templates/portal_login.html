<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Clientes - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        /* --- GUÍA DE ESTILO MAESTRA --- */
        :root {
            /* Paleta Corporativa */
            --azul-corporativo: #2B3A55;
            --naranja-corporativo: #F99417;
            
            /* Colores de Soporte */
            --gris-fondo: #f8f9fa;
            --blanco-tarjetas: #FFFFFF;
            --texto-oscuro: #212529;
            --texto-claro: #6c757d;
            --borde-sutil: #e9ecef;
        }

        /* --- ESTILOS ESPECÍFICOS PARA LOGIN --- */
        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--azul-corporativo);
            background-image: linear-gradient(160deg, var(--azul-corporativo) 0%, #1a2233 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
        }

        .login-card {
            background-color: var(--blanco-tarjetas);
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        .login-header h1 {
            color: var(--azul-corporativo);
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        .login-header p {
            margin-bottom: 2rem;
            color: var(--texto-claro);
        }

        .form-control {
            border-radius: 0.5rem;
            padding: 0.75rem 1rem;
            border: 1px solid var(--borde-sutil);
        }
        .form-control:focus {
            border-color: var(--naranja-corporativo);
            box-shadow: 0 0 0 0.25rem rgba(249, 148, 23, 0.25);
        }

        .btn-primary {
            background-color: var(--naranja-corporativo);
            border-color: var(--naranja-corporativo);
            color: var(--blanco-tarjetas);
            font-weight: 600;
            padding: 0.75rem;
            border-radius: 0.5rem;
            width: 100%;
            margin-top: 1rem;
            transition: background-color 0.2s;
        }
        .btn-primary:hover {
            background-color: #d87e12;
            border-color: #d87e12;
        }

        footer {
            margin-top: 2.5rem;
            font-size: 0.9em;
            color: var(--texto-claro);
        }
        
        .alert {
            border-radius: 0.5rem;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <h1>Portal de Clientes</h1>
            <p>Ingresa tus credenciales para acceder a tu cuenta.</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category if category != 'error' else 'danger' }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('portal_login') }}">
            <div class="mb-3">
                <label for="cedula" class="form-label text-start d-block">Cédula de Identidad</label>
                <input type="text" class="form-control" id="cedula" name="cedula" placeholder="12345678" required>
            </div>
            <div class="mb-3">
                <label for="contrato_nro" class="form-label text-start d-block">Número de Contrato</label>
                <input type="text" class="form-control" id="contrato_nro" name="contrato_nro" placeholder="00123" required>
            </div>
            <div class="d-grid mt-4">
                <button type="submit" class="btn btn-primary">Iniciar Sesión</button>
            </div>
        </form>
        
        <div class="footer-text mt-4">
            &copy; {{ anio_actual }} Moto Plan Motors C.A.
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
