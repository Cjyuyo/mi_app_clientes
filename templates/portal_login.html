<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Clientes | Moto Plan Motors</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-fintech: #F8FAFC;
            --card-bg: #FFFFFF;
            --primary-brand: #F99417; /* Naranja Corporativo */
            --primary-hover: #E88300;
            --text-dark: #0F172A;
            --text-muted: #64748B;
            --input-border: #E2E8F0;
            --input-focus-ring: rgba(249, 148, 23, 0.15);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-fintech);
            background-image: 
                radial-gradient(at 0% 0%, hsla(28,100%,74%,0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, hsla(214,32%,91%,1) 0px, transparent 50%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 1.5rem;
        }

        .login-card {
            background-color: var(--card-bg);
            padding: 3rem 2.5rem;
            border-radius: 24px;
            box-shadow: 0 20px 40px -15px rgba(0,0,0,0.05), 0 0 0 1px rgba(0,0,0,0.02);
            width: 100%;
            max-width: 400px;
            position: relative;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        
        .icon-wrapper {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%);
            border: 1px solid #fde68a;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.25rem auto;
            box-shadow: 0 4px 6px -1px rgba(249, 148, 23, 0.1);
        }
        .icon-wrapper i {
            font-size: 1.5rem;
            color: var(--primary-brand);
        }

        .login-header h1 {
            color: var(--text-dark);
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            margin-bottom: 0.25rem;
        }
        .login-header p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin: 0;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .input-wrapper i {
            position: absolute;
            left: 1rem;
            color: #94A3B8;
            font-size: 1.1rem;
            transition: color 0.2s ease;
        }
        .form-control-fintech {
            width: 100%;
            padding: 0.875rem 1rem 0.875rem 2.75rem;
            font-size: 0.95rem;
            color: var(--text-dark);
            background-color: #FFFFFF;
            border: 1px solid var(--input-border);
            border-radius: 12px;
            transition: all 0.2s ease;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
            outline: none;
        }
        .form-control-fintech::placeholder {
            color: #CBD5E1;
        }
        .form-control-fintech:focus {
            border-color: var(--primary-brand);
            box-shadow: 0 0 0 4px var(--input-focus-ring);
        }
        .form-control-fintech:focus + i, .input-wrapper:focus-within i {
            color: var(--primary-brand);
        }

        .btn-primary-fintech {
            width: 100%;
            background-color: var(--primary-brand);
            color: white;
            font-weight: 600;
            padding: 0.875rem;
            border: none;
            border-radius: 12px;
            margin-top: 1rem;
            box-shadow: 0 4px 6px -1px rgba(249, 148, 23, 0.2);
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-primary-fintech:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(249, 148, 23, 0.3);
        }

        .alert-fintech {
            border: none;
            border-radius: 12px;
            font-size: 0.85rem;
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background-color: #FEF2F2;
            color: #EF4444;
        }

        .footer-text {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.8rem;
            color: #94A3B8;
        }
        .footer-text strong {
            color: var(--text-dark);
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <div class="icon-wrapper">
                <i class="bi bi-shield-lock-fill"></i>
            </div>
            <h1>Portal de Clientes</h1>
            <p>Ingresa para gestionar tu cuenta.</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-fintech alert-dismissible fade show" role="alert">
                        <i class="bi bi-info-circle-fill"></i>
                        <div>{{ message }}</div>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close" style="font-size: 0.7rem;"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('portal_login') }}">
            <div class="form-group">
                <label class="form-label" for="cedula">Cédula de Identidad</label>
                <div class="input-wrapper">
                    <i class="bi bi-person-vcard"></i>
                    <input type="text" class="form-control-fintech" id="cedula" name="cedula" placeholder="Ej. V12345678" required autocomplete="off">
                </div>
            </div>
            
            <div class="form-group mb-4">
                <label class="form-label" for="contrato_nro">Número de Contrato</label>
                <div class="input-wrapper">
                    <i class="bi bi-file-earmark-text"></i>
                    <input type="text" class="form-control-fintech" id="contrato_nro" name="contrato_nro" placeholder="Ingresa tu número" required autocomplete="off">
                </div>
            </div>

            <button type="submit" class="btn-primary-fintech">
                Iniciar Sesión <i class="bi bi-arrow-right-short fs-5"></i>
            </button>
        </form>

        <div class="footer-text">
            &copy; {{ g.anio_actual | default('2026') }} <strong>Moto Plan Motors C.A.</strong>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
