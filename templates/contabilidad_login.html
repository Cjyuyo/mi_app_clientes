<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Contabilidad | Sistema de Gestión</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: #f0f2f5;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-md mx-auto">
        <div class="text-center mb-8">
            <img src="https://sistema-integral-moto-plan-motors-2025.s3.us-east-1.amazonaws.com/Logo/ColorLargo.svg" alt="Logo Moto Plan Motors" class="w-64 mx-auto">
            <h1 class="text-2xl font-bold text-slate-800 mt-6">Portal de Contabilidad</h1>
            <p class="text-slate-500">Acceso exclusivo para el personal autorizado.</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="mb-4 space-y-2">
                {% for category, message in messages %}
                    <div class="p-3 rounded-md text-sm text-center
                        {% if category == 'danger' or category == 'error' %} bg-red-100 text-red-700 
                        {% else %} bg-blue-100 text-blue-700 {% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <div class="bg-white p-8 rounded-2xl shadow-xl border border-slate-200/80">
            <form action="{{ url_for('portal_contabilidad_login') }}" method="POST" class="space-y-6">
                <div>
                    <label for="usuario" class="block text-sm font-medium text-slate-700 mb-1">Usuario</label>
                    <div class="relative">
                        <i class="bi bi-person-fill absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input type="text" id="usuario" name="usuario" required
                               class="w-full pl-10 pr-3 py-2.5 border border-slate-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-orange-500 transition">
                    </div>
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Contraseña</label>
                    <div class="relative">
                        <i class="bi bi-lock-fill absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input type="password" id="password" name="password" required
                               class="w-full pl-10 pr-3 py-2.5 border border-slate-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-orange-500 transition">
                    </div>
                </div>
                <div>
                    <button type="submit"
                            class="w-full bg-slate-800 text-white font-bold py-3 px-4 rounded-lg hover:bg-slate-900 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-800 transition-transform duration-150 ease-in-out hover:scale-[1.02] active:scale-100">
                        Iniciar Sesión
                    </button>
                </div>
            </form>
        </div>
        <div class="text-center mt-8">
            <small class="text-slate-500">&copy; {{ anio_actual }} - Sistema de Gestión.</small>
        </div>
    </div>
</body>
</html>
