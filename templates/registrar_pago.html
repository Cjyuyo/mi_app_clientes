<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Pago - {{ cliente.nombre_apellido }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        /* --- GUÍA DE ESTILO MAESTRA --- */
        :root {
            --azul-corporativo: #2B3A55;
            --naranja-corporativo: #F99417;
            --gris-fondo: #f8f9fa;
            --blanco-tarjetas: #FFFFFF;
            --texto-oscuro: #212529;
            --texto-claro: #6c757d;
            --borde-sutil: #e9ecef;
            --theme-color: var(--naranja-corporativo);
        }

        /* --- ESTILOS GLOBALES --- */
        body {
            background-color: var(--gris-fondo);
            font-family: 'Roboto', sans-serif;
            color: var(--texto-oscuro);
            padding: 2rem 1rem;
        }
        .container-main {
            max-width: 800px;
            margin: auto;
        }

        /* --- COMPONENTES --- */
        .form-container {
            background-color: var(--blanco-tarjetas);
            border-radius: .75rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.07);
            overflow: hidden;
        }
        .form-header {
            background-color: var(--theme-color);
            color: var(--blanco-tarjetas);
            padding: 1.5rem 2rem;
        }
        .form-header h1 { margin: 0; font-size: 1.5rem; font-weight: 700; }
        .form-header p { margin: 0; opacity: 0.9; }
        
        form { padding: 2rem; }
        .section { margin-bottom: 2rem; }
        .section h3 {
            font-size: 1rem;
            font-weight: 500;
            color: var(--texto-claro);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--borde-sutil);
            padding-bottom: .75rem;
            margin-bottom: 1.5rem;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.25rem;
        }
        .form-group label {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--texto-oscuro);
            margin-bottom: .5rem;
        }
        .form-control, .form-select {
            border-radius: .5rem;
            padding: .75rem 1rem;
            border: 1px solid var(--borde-sutil);
        }
        input[readonly] { background-color: var(--gris-fondo); }
        
        .button-group {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--borde-sutil);
        }
        .btn-primary {
            background-color: var(--theme-color);
            border-color: var(--theme-color);
            font-weight: 500;
        }
        .btn-primary:hover {
            filter: brightness(90%);
            background-color: var(--theme-color);
            border-color: var(--theme-color);
        }
    </style>
</head>
<body>
<div class="container-main">
    <div class="form-container">
        <div class="form-header">
            <h1>Registrar Pago</h1>
            <p>Para: {{ cliente.nombre_apellido }}</p>
        </div>

        <form action="{{ url_for('registrar_pago', client_id=cliente.id) }}" method="POST">
            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="alert alert-{{ 'danger' if category == 'error' else category }}">{{ message }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <div class="section">
                <h3>Detalles del Monto y Método</h3>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="tipo_pago">Tipo de Pago</label>
                        <select id="tipo_pago" name="tipo_pago" class="form-select" required>
                            {% set inscripcion_total = cliente.inscripcion_monto|float if cliente.inscripcion_monto else 0 %}
                            {% set inscripcion_pagada = cliente.inscripcion_pagada|float if cliente.inscripcion_pagada else 0 %}
                            {% if inscripcion_pagada < inscripcion_total %}<option value="Inscripción">Inscripción</option>{% else %}<option value="Cuota">Cuota</option>{% endif %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="pago_en">Pago en</label>
                        <select id="pago_en" name="pago_en" class="form-select" required>
                            <option value="Efectivo USD" selected>Efectivo USD</option>
                            <option value="Dolar/BCV">Dolar/BCV</option>
                            <option value="Euro/BCV">Euro/BCV</option>
                            <option value="USDT">USDT</option>
                            <option value="Bolívares Efectivo">Bolívares Efectivo</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="forma_pago">Forma de Pago</label>
                        <select id="forma_pago" name="forma_pago" class="form-select" required>
                            <option value="">Seleccione...</option>
                            <option value="Efectivo">Efectivo</option>
                            <option value="Transferencia Bancaria">Transferencia Bancaria</option>
                            <option value="Pago Movil">Pago Móvil</option>
                            <option value="Binance">Binance</option>
                            <option value="Nequi">Nequi</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="monto_usd">Monto del Pago (USD)</label>
                        <input type="number" id="monto_usd" step="0.01" name="monto" class="form-control" required>
                    </div>
                    <!-- CAMPOS DE TASA OCULTOS -->
                    <div class="form-group" style="display: none;">
                        <label for="tasa_dia">Tasa del Día (BCV)</label>
                        <input type="number" id="tasa_dia" step="0.01" name="tasa_dia" class="form-control" readonly>
                    </div>
                    <div class="form-group" style="display: none;">
                        <label for="monto_bs_calculado">Monto en Bs (Calculado)</label>
                        <input type="number" id="monto_bs_calculado" step="0.01" name="monto_bs" class="form-control" readonly>
                    </div>
                </div>
            </div>

            <div class="section">
                <h3>Información Adicional</h3>
                <div class="form-grid">
                    <div class="form-group" id="banco_group" style="display: none;">
                        <label for="banco">Banco</label>
                        <select id="banco" name="banco" class="form-select">
                            <option value="">Seleccione un banco...</option>
                            <option value="0102 - Banco de Venezuela S.A.C.A.">0102 - Banco de Venezuela S.A.C.A.</option>
                            <option value="0104 - Venezolano de Crédito S.A.">0104 - Venezolano de Crédito S.A.</option>
                            <option value="0105 - Mercantil Banco Universal C.A.">0105 - Mercantil Banco Universal C.A.</option>
                            <option value="0108 - BBVA Banco Provincial">0108 - BBVA Banco Provincial</option>
                            <option value="0114 - Bancaribe C.A.">0114 - Bancaribe C.A.</option>
                            <option value="0115 - Banco Exterior C.A.">0115 - Banco Exterior C.A.</option>
                            <option value="0128 - Banco Caroní C.A.">0128 - Banco Caroní C.A.</option>
                            <option value="0134 - Banesco Banco Universal C.A.">0134 - Banesco Banco Universal C.A.</option>
                            <option value="0137 - Banco Sofitasa C.A.">0137 - Banco Sofitasa C.A.</option>
                            <option value="0138 - Banco Plaza C.A.">0138 - Banco Plaza C.A.</option>
                            <option value="0146 - Bangente C.A.">0146 - Bangente C.A.</option>
                            <option value="0151 - BFC Banco Fondo Común C.A.">0151 - BFC Banco Fondo Común C.A.</option>
                            <option value="0156 - 100% Banco C.A.">0156 - 100% Banco C.A.</option>
                            <option value="0157 - DelSur Banco Universal C.A.">0157 - DelSur Banco Universal C.A.</option>
                            <option value="0163 - Banco del Tesoro C.A.">0163 - Banco del Tesoro C.A.</option>
                            <option value="0166 - Banco Agrícola de Venezuela C.A.">0166 - Banco Agrícola de Venezuela C.A.</option>
                            <option value="0171 - Banco Activo C.A.">0171 - Banco Activo C.A.</option>
                            <option value="0172 - Bancamiga Banco Universal C.A.">0172 - Bancamiga Banco Universal C.A.</option>
                            <option value="0173 - Banco Internacional de Desarrollo C.A.">0173 - Banco Internacional de Desarrollo C.A.</option>
                            <option value="0174 - Banplus Banco Universal C.A.">0174 - Banplus Banco Universal C.A.</option>
                            <option value="0175 - Banco Digital de los Trabajadores (BDT)">0175 - Banco Digital de los Trabajadores (BDT)</option>
                            <option value="0177 - BANFANB">0177 - BANFANB - Banco de la Fuerza Armada Nacional Bolivariana</option>
                            <option value="0178 - N58 Banco Digital C.A.">0178 - N58 Banco Digital C.A.</option>
                            <option value="0191 - Banco Nacional de Crédito (BNC)">0191 - Banco Nacional de Crédito (BNC)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="referencia">Referencia</label>
                        <input type="text" id="referencia" name="referencia" class="form-control">
                    </div>
                    <div class="form-group">
                        <label for="fecha_pago">Fecha de Pago</label>
                        <input type="date" id="fecha_pago" name="fecha_pago" class="form-control" required>
                    </div>
                    <div class="form-group">
                         <label for="lugar_emision">Lugar de Emisión</label>
                         <select id="lugar_emision" name="lugar_emision" class="form-select" required>
                            <option value="Acarigua">Acarigua</option>
                            <option value="Barquisimeto">Barquisimeto</option>
                         </select>
                    </div>
                    <div class="form-group col-12">
                        <label for="por_concepto_de">Por Concepto de</label>
                        <textarea id="por_concepto_de" name="por_concepto_de" rows="3" class="form-control" required></textarea>
                    </div>
                </div>
            </div>

            <div class="button-group">
                <a href="{{ url_for('consulta', busqueda=cliente.cedula) }}" class="btn btn-secondary">Cancelar</a>
                <button type="submit" class="btn btn-primary">Guardar Pago</button>
            </div>
        </form>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const tasaUsd = {{ tasas_hoy.tasa|float if tasas_hoy and tasas_hoy.tasa else 'null' }};
    const tasaEur = {{ tasas_hoy.tasa_euro|float if tasas_hoy and tasas_hoy.tasa_euro else 'null' }};
    const pagoEnSelect = document.getElementById('pago_en');
    const formaPagoSelect = document.getElementById('forma_pago');
    const montoUsdInput = document.getElementById('monto_usd');
    const tasaDiaInput = document.getElementById('tasa_dia');
    const montoBsCalculadoInput = document.getElementById('monto_bs_calculado');
    const referenciaInput = document.getElementById('referencia');
    const bancoGroup = document.getElementById('banco_group');
    const bancoSelect = document.getElementById('banco');

    function calcularMontoBs() {
        const montoUsd = parseFloat(montoUsdInput.value) || 0;
        const tasaDia = parseFloat(tasaDiaInput.value) || 0;
        if (montoUsd > 0 && tasaDia > 0) {
            montoBsCalculadoInput.value = (montoUsd * tasaDia).toFixed(2);
        } else {
            montoBsCalculadoInput.value = '';
        }
    }

    function handlePagoEnChange() {
        const pagoEnValue = pagoEnSelect.value;
        tasaDiaInput.value = '';
        if (pagoEnValue === 'Dolar/BCV') {
            tasaDiaInput.value = tasaUsd || '';
        } else if (pagoEnValue === 'Euro/BCV') {
            tasaDiaInput.value = tasaEur || '';
        }
        calcularMontoBs();
    }

    function toggleFieldsByFormaPago() {
        const formaPagoValue = formaPagoSelect.value;
        const isEfectivo = formaPagoValue === 'Efectivo';

        // Deshabilitar/Habilitar campos
        referenciaInput.disabled = isEfectivo;
        bancoSelect.disabled = isEfectivo;

        // Limpiar valores si es efectivo
        if (isEfectivo) {
            referenciaInput.value = '';
            bancoSelect.value = '';
        }

        // Mostrar/Ocultar campos
        bancoGroup.style.display = (formaPagoValue === 'Transferencia Bancaria' || formaPagoValue === 'Pago Movil') ? 'block' : 'none';
        bancoSelect.required = (formaPagoValue === 'Transferencia Bancaria' || formaPagoValue === 'Pago Movil');
    }

    pagoEnSelect.addEventListener('change', handlePagoEnChange);
    formaPagoSelect.addEventListener('change', toggleFieldsByFormaPago);
    montoUsdInput.addEventListener('input', calcularMontoBs);
    
    // Inicializar estado del formulario
    handlePagoEnChange();
    toggleFieldsByFormaPago();

    document.querySelector('form').addEventListener('submit', function(e) {
        if (this.getAttribute('data-submitted') === 'true') {
            e.preventDefault();
            return;
        }
        this.setAttribute('data-submitted', 'true');
        this.querySelector('button[type="submit"]').setAttribute('disabled', 'disabled');
        this.querySelector('button[type="submit"]').innerHTML = 'Procesando...';
    });
});
</script>

</body>
</html>
