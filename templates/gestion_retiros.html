<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Componente: Gestión de Retiros</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        .content-card {
            background-color: #FFFFFF;
            border: none;
            border-radius: .75rem;
            box-shadow: 0 4px 25px rgba(0,0,0,0.05);
            margin-bottom: 2rem;
            height: 100%;
        }
        .content-card-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #e9ecef;
            font-size: 1.1rem;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <!-- Tarjeta de Gestión de Retiros -->
    <div class="content-card">
        <div class="content-card-header bg-danger-subtle text-danger-emphasis">
            <i class="bi bi-door-open-fill"></i> Solicitudes de Retiro
            <span class="badge bg-danger-subtle text-danger-emphasis ms-auto">{{ solicitudes.retiros|length }}</span>
        </div>
        <div class="list-group list-group-flush">
            {% for solicitud in solicitudes.retiros %}
            <div class="list-group-item d-flex justify-content-between align-items-center">
                <div>
                    <strong>{{ solicitud.nombre_cliente }}</strong><br>
                    <small class="text-muted">{{ solicitud.fecha_creacion | format_datetime }}</small>
                </div>
                <button class="btn btn-sm btn-outline-dark manage-btn" 
                        data-bs-toggle="modal" 
                        data-bs-target="#retiroModal"
                        data-action-url="{{ url_for('procesar_solicitud', solicitud_id=solicitud.id) }}"
                        data-cliente-nombre="{{ solicitud.nombre_cliente }}"
                        data-fecha-solicitud="{{ solicitud.fecha_creacion | format_datetime }}">
                    Gestionar
                </button>
            </div>
            {% else %}
            <div class="list-group-item text-muted text-center p-4">No hay solicitudes de retiro pendientes.</div>
            {% endfor %}
        </div>
        <div class="card-footer text-center">
            <a href="#" class="btn btn-link btn-sm">Ver Historial de Retiros</a>
        </div>
    </div>
</body>
</html>
