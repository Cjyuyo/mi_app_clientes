<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estado de Cuenta - {{ cliente.nombre_apellido }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f1f5f9; /* slate-100 */
        }

        /* --- INICIO DEL CAMBIO --- */
        .print-only {
            display: none; /* Oculto por defecto en la pantalla */
        }
        /* --- FIN DEL CAMBIO --- */

        @media print {
            body { 
                background: #fff !important; 
            }
            .no-print { 
                display: none !important; 
            }

            /* --- INICIO DEL CAMBIO --- */
            .print-only {
                display: block; /* Visible solo al imprimir */
            }
            /* --- FIN DEL CAMBIO --- */
            
            .printable-section { 
                box-shadow: none !important; 
                border: 1px solid #e5e7eb !important; 
                margin: 0 !important;
                padding: 0 !important;
            }
        }
    </style>
</head>
<body class="py-8 sm:py-12 px-4">
    <div class="max-w-5xl mx-auto">
        <div class="no-print mb-8 flex justify-between items-center">
            <img src="https://sistema-integral-moto-plan-motors-2025.s3.us-east-1.amazonaws.com/Logo/NEGRO_Mesa+de+trabajo+1.png" alt="Logo Moto Plan Motors" class="h-20">
            <a href="{{ url_for('portal_dashboard') }}" class="bg-slate-200 text-slate-800 font-semibold py-2 px-4 rounded-lg hover:bg-slate-300 transition-colors inline-flex items-center gap-2 text-sm">
                <i class="bi bi-arrow-left"></i> Volver a Zona Cliente
            </a>
        </div>

        <div class="bg-white rounded-xl shadow-lg printable-section">
            {% include '_estado_cuenta_content.html' %}
        </div>
        
        <div class="no-print mt-8 text-center">
            <button onclick="window.print()" class="bg-slate-800 text-white font-bold py-3 px-6 rounded-lg hover:bg-slate-900 transition-colors inline-flex items-center gap-2 shadow-md">
                <i class="bi bi-printer-fill"></i> Imprimir / Guardar como PDF
            </button>
        </div>
    </div>
</body>
</html>
