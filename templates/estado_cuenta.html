<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estado de Cuenta - {{ cliente.nombre_apellido }}</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .print-text-black { color: #000 !important; }
        @media print {
            body { background-color: #fff !important; }
            .no-print { display: none !important; }
            .printable-section {
                box-shadow: none !important;
                border: 1px solid #e5e7eb !important;
                padding: 1.5rem !important;
                margin: 0 !important;
            }
        }
    </style>
</head>
<body class="p-4 sm:p-8">
    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-lg">
        {% include '_estado_cuenta_content.html' %}
    </div>
    
    <div class="no-print max-w-4xl mx-auto mt-6 text-center">
        <button onclick="window.print()" class="bg-slate-700 text-white font-semibold py-2 px-4 rounded-lg hover:bg-slate-800 inline-flex items-center gap-2">
            <i class="bi bi-printer-fill"></i> Imprimir / Guardar PDF
        </button>
    </div>
</body>
