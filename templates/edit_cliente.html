<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Cliente - {{ cliente.nombre_apellido }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        /* --- GUÍA DE ESTILO MAESTRA --- */
        :root {
            /* Paleta Corporativa */
            --azul-corporativo: #2B3A55;
            --naranja-corporativo: #F99417;
            
            /* Colores de Soporte */
            --gris-fondo: #f8f9fa;
            --blanco-tarjetas: #FFFFFF;
            --texto-oscuro: #212529;
            --texto-claro: #6c757d;
            --borde-sutil: #e9ecef;

            /* Color temático de esta página */
            --theme-color: var(--naranja-corporativo);
        }

        /* --- ESTILOS GLOBALES --- */
        body {
            background-color: var(--gris-fondo);
            font-family: 'Roboto', sans-serif;
            color: var(--texto-oscuro);
            padding: 2rem 1rem;
        }
        .container-main {
            max-width: 800px;
            margin: auto;
        }

        /* --- COMPONENTES --- */
        .form-container {
            background-color: var(--blanco-tarjetas);
            border-radius: .75rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.07);
            overflow: hidden;
        }
        .form-header {
            background-color: var(--theme-color);
            color: var(--blanco-tarjetas);
            padding: 1.5rem 2rem;
        }
        .form-header h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 700;
        }
        .form-header p {
            margin: 0;
            opacity: 0.9;
        }
        form {
            padding: 2rem;
        }
        .section {
            margin-bottom: 2rem;
        }
        .section h3 {
            font-size: 1rem;
            font-weight: 500;
            color: var(--texto-claro);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--borde-sutil);
            padding-bottom: .75rem;
            margin-bottom: 1.5rem;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.25rem;
        }
        .form-group label {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--texto-oscuro);
            margin-bottom: .5rem;
        }
        .form-control, .form-select {
            border-radius: .5rem;
            padding: .75rem 1rem;
            border: 1px solid var(--borde-sutil);
        }
        .button-group {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--borde-sutil);
        }
        .btn-primary {
            background-color: var(--theme-color);
            border-color: var(--theme-color);
            font-weight: 500;
        }
        .btn-primary:hover {
            filter: brightness(90%);
            background-color: var(--theme-color);
            border-color: var(--theme-color);
        }
    </style>
</head>
<body>
<div class="container-main">
    <div class="form-container">
        <div class="form-header">
            <h1>Editar Cliente</h1>
            <p>{{ cliente.nombre_apellido }}</p>
        </div>

        <form action="{{ url_for('edit_client', client_id=cliente.id) }}" method="POST">
            <input type="hidden" name="id" value="{{ cliente.id }}">

            <div class="section">
                <h3>Información Personal y de Contrato</h3>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="nombre_apellido">Nombre y Apellido</label>
                        <input type="text" id="nombre_apellido" name="nombre_apellido" value="{{ cliente.nombre_apellido }}" class="form-control">
                    </div>
                    <div class="form-group">
                        <label for="cedula">Cédula</label>
                        <input type="text" id="cedula" name="cedula" value="{{ cliente.cedula }}" class="form-control">
                    </div>
                    <div class="form-group">
                        <label for="telefono">Teléfono</label>
                        <input type="text" id="telefono" name="telefono" value="{{ cliente.telefono or '' }}" class="form-control">
                    </div>
                    <div class="form-group">
                        <label for="contrato_nro">N° de Contrato</label>
                        <input type="text" id="contrato_nro" name="contrato_nro" value="{{ cliente.contrato_nro or '' }}" class="form-control">
                    </div>
                    <div class="form-group">
                        <label for="fecha_ingreso">Fecha de Ingreso</label>
                        <input type="date" id="fecha_ingreso" name="fecha_ingreso" value="{{ cliente.fecha_ingreso.strftime('%Y-%m-%d') if cliente.fecha_ingreso else '' }}" class="form-control">
                    </div>
                </div>
            </div>

            <div class="section">
                <h3>Detalles del Plan y Financieros</h3>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="plan_contratado">Plan Contratado</label>
                        <input type="text" id="plan_contratado" name="plan_contratado" value="{{ cliente.plan_contratado or '' }}" class="form-control">
                    </div>
                    <div class="form-group">
                        <label for="inscripcion_monto">Monto de Inscripción (USD)</label>
                        <input type="number" step="0.01" id="inscripcion_monto" name="inscripcion_monto" value="{{ cliente.inscripcion_monto or '0.00' }}" class="form-control">
                    </div>
                    <div class="form-group">
                        <label for="valor_cuota">Valor de Cuota (USD)</label>
                        <input type="number" step="0.01" id="valor_cuota" name="valor_cuota" value="{{ cliente.valor_cuota or '0.00' }}" class="form-control">
                    </div>
                    <div class="form-group">
                        <label for="cuotas_totales">Cuotas Totales</label>
                        <input type="number" id="cuotas_totales" name="cuotas_totales" value="{{ cliente.cuotas_totales or '0' }}" class="form-control">
                    </div>
                </div>
            </div>

            <div class="section">
                <h3>Estado y Proceso del Cliente</h3>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="proceso">Proceso</label>
                        <select id="proceso" name="proceso" class="form-select">
                            {% set procesos = ['ADJUDICADO', 'AHORRADOR', 'COBRANZA DIFERIDA', 'INSCRITO', 'PENDIENTE', 'RESERVA', 'RETIRO'] %}
                            {% for p in procesos %}
                                <option value="{{ p }}" {% if cliente.proceso and cliente.proceso.upper() == p %}selected{% endif %}>{{ p.replace('_', ' ') | title }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="estatus">Estatus</label>
                        <select id="estatus" name="estatus" class="form-select">
                            {% set estatuses = ['ACTIVO', 'COMPLETADO', 'CONGELADO', 'DIFERIDO EN RESERVA', 'INACTIVO', 'RESERVA', 'RETIRO'] %}
                            {% for e in estatuses %}
                                <option value="{{ e }}" {% if cliente.estatus and cliente.estatus.upper() == e %}selected{% endif %}>{{ e.replace('_', ' ') | title }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
            </div>
            
            <div class="button-group">
                <a href="{{ url_for('consulta', busqueda=cliente.cedula) }}" class="btn btn-secondary">Cancelar</a>
                <button type="submit" class="btn btn-primary">Guardar Cambios</button>
            </div>
        </form>
    </div>
</div>
<script>
    (function() {
        const form = document.querySelector('form');
        form.addEventListener('submit', function(e) {
            if (form.getAttribute('data-submitted') === 'true') {
                e.preventDefault();
                return;
            }
            form.setAttribute('data-submitted', 'true');
            const submitButton = form.querySelector('button[type="submit"]');
            submitButton.setAttribute('disabled', 'disabled');
            submitButton.innerHTML = 'Procesando...';
        });
    })();
</script>
</body>
</html>
