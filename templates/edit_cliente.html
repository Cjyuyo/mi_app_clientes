{% extends 'base_sidebar.html' %}

{% block title %}
    Editar Cliente - {{ cliente.nombre_apellido }}
{% endblock %}

{% block body %}
    <div class="form-container">
        <div class="form-header" style="background-color: var(--naranja-corporativo);">
            <h1>Editar Cliente</h1>
            <p>{{ cliente.nombre_apellido }}</p>
        </div>

        <form action="{{ url_for('edit_client', client_id=cliente.id) }}" method="POST" class="p-4">
            <input type="hidden" name="id" value="{{ cliente.id }}">
            
            <!-- Secciones del formulario -->
            <div class="section">
                <h3>Información Personal y de Contrato</h3>
                <div class="form-grid">
                    <!-- Campos del formulario -->
                </div>
            </div>
            
            <div class="button-group">
                <a href="{{ url_for('consulta', busqueda=cliente.cedula) }}" class="btn btn-secondary">Cancelar</a>
                <button type="submit" class="btn btn-primary">Guardar Cambios</button>
            </div>
        </form>
    </div>
{% endblock %}

{% block scripts_extra %}
<script>
    (function() {
        const form = document.querySelector('form');
        form.addEventListener('submit', function(e) {
            if (form.getAttribute('data-submitted') === 'true') {
                e.preventDefault();
                return;
            }
            form.setAttribute('data-submitted', 'true');
            const submitButton = form.querySelector('button[type="submit"]');
            submitButton.setAttribute('disabled', 'disabled');
            submitButton.innerHTML = 'Procesando...';
        });
    })();
</script>
{% endblock %}
