{% extends 'base_sidebar.html' %}

{% block title %}
    Editar Cliente - {{ cliente.nombre_apellido }}
{% endblock %}

{% block body %}
<div class="max-w-4xl mx-auto">
    <div class="bg-white rounded-xl shadow-sm overflow-hidden">
        <!-- Encabezado del Formulario -->
        <div class="bg-slate-800 text-white p-5">
            <h1 class="text-2xl font-bold"><i class="bi bi-pencil-square mr-2"></i>Editar Cliente</h1>
            <p class="text-sm text-slate-300">{{ cliente.nombre_apellido }}</p>
        </div>

        <form action="{{ url_for('edit_client', client_id=cliente.id) }}" method="POST" class="p-6 space-y-8">
            <input type="hidden" name="id" value="{{ cliente.id }}">
            
            <!-- Sección de Información Personal -->
            <div>
                <h2 class="text-lg font-semibold text-slate-700 border-b pb-2 mb-4">Información Personal</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label for="nombre" class="block text-sm font-medium text-slate-700">Nombres</label>
                        <input type="text" id="nombre" name="nombre" value="{{ cliente.nombre }}" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500" required>
                    </div>
                    <div>
                        <label for="apellido" class="block text-sm font-medium text-slate-700">Apellidos</label>
                        <input type="text" id="apellido" name="apellido" value="{{ cliente.apellido }}" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500" required>
                    </div>
                    <div>
                        <label for="cedula" class="block text-sm font-medium text-slate-700">Cédula</label>
                        <input type="text" id="cedula" name="cedula" value="{{ cliente.cedula }}" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500" required>
                    </div>
                    <div>
                        <label for="telefono" class="block text-sm font-medium text-slate-700">Teléfono</label>
                        <input type="tel" id="telefono" name="telefono" value="{{ cliente.telefono }}" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
                    </div>
                    <div class="md:col-span-2">
                        <label for="direccion" class="block text-sm font-medium text-slate-700">Dirección</label>
                        <textarea id="direccion" name="direccion" rows="3" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">{{ cliente.direccion }}</textarea>
                    </div>
                </div>
            </div>

            <!-- Sección de Detalles del Contrato -->
            <div>
                <h2 class="text-lg font-semibold text-slate-700 border-b pb-2 mb-4">Detalles del Contrato</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label for="contrato_nro" class="block text-sm font-medium text-slate-700">Número de Contrato</label>
                        <input type="text" id="contrato_nro" name="contrato_nro" value="{{ cliente.contrato_nro }}" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
                    </div>
                    <div>
                        <label for="plan_contratado" class="block text-sm font-medium text-slate-700">Plan Contratado</label>
                        <input type="text" id="plan_contratado" name="plan_contratado" value="{{ cliente.plan_contratado }}" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
                    </div>
                    <div>
                        <label for="grupo" class="block text-sm font-medium text-slate-700">Grupo</label>
                        <input type="text" id="grupo" name="grupo" value="{{ cliente.grupo }}" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
                    </div>
                    <div>
                        <label for="estatus" class="block text-sm font-medium text-slate-700">Estatus</label>
                        <select id="estatus" name="estatus" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
                            <option {% if cliente.estatus == 'ACTIVO' %}selected{% endif %}>ACTIVO</option>
                            <option {% if cliente.estatus == 'INACTIVO' %}selected{% endif %}>INACTIVO</option>
                            <option {% if cliente.estatus == 'RESERVA' %}selected{% endif %}>RESERVA</option>
                            <option {% if cliente.estatus == 'ADJUDICADO' %}selected{% endif %}>ADJUDICADO</option>
                            <option {% if cliente.estatus == 'RETIRO' %}selected{% endif %}>RETIRO</option>
                            <option {% if cliente.estatus == 'CONGELADO' %}selected{% endif %}>CONGELADO</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Acciones del Formulario -->
            <div class="flex justify-end gap-3 pt-4 border-t">
                <a href="{{ url_for('consulta', busqueda=cliente.cedula) }}" class="text-sm bg-white text-slate-700 font-semibold py-2 px-4 rounded-lg border border-slate-300 hover:bg-slate-50">Cancelar</a>
                <button type="submit" class="text-sm bg-blue-600 text-white font-semibold py-2 px-4 rounded-lg hover:bg-blue-700">
                    Guardar Cambios
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts_extra %}
<script>
    (function() {
        const form = document.querySelector('form');
        form.addEventListener('submit', function(e) {
            if (form.getAttribute('data-submitted') === 'true') {
                e.preventDefault();
                return;
            }
            form.setAttribute('data-submitted', 'true');
            const submitButton = form.querySelector('button[type="submit"]');
            submitButton.setAttribute('disabled', 'disabled');
            submitButton.innerHTML = 'Procesando...';
        });
    })();
</script>
{% endblock %}
