{% extends 'base_sidebar.html' %}

{% block title %}
    Registro de Auditoría
{% endblock %}

{% block body %}
    <div class="main-header text-white text-center mb-4" style="background-color: #7f8c8d; border-radius: .5rem;">
        <h1><i class="bi bi-shield-check"></i> Registro de Auditoría</h1>
        <p class="lead">Trazabilidad completa de las acciones en el sistema.</p>
    </div>

    <div class="card content-card mb-4">
        <div class="card-body d-flex justify-content-center">
            <form method="GET" action="{{ url_for('auditoria') }}" class="row g-3 align-items-end">
                <div class="col-auto">
                    <label for="fecha" class="form-label">Filtrar por fecha:</label>
                    <input type="date" id="fecha" name="fecha" class="form-control" value="{{ fecha_filtro }}">
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-primary" style="background-color: #7f8c8d; border-color: #7f8c8d;"><i class="bi bi-funnel-fill me-2"></i>Filtrar</button>
                </div>
                <div class="col-auto">
                    <a href="{{ url_for('descargar_reporte_auditoria', fecha=fecha_filtro) }}" class="btn btn-success" target="_blank">
                        <i class="bi bi-download me-2"></i>Descargar Reporte
                    </a>
                </div>
            </form>
        </div>
    </div>

    <div class="card content-card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <!-- Contenido de la tabla de auditoría -->
                </table>
            </div>
        </div>
    </div>
{% endblock %}
