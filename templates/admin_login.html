<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Workspace | Moto Plan Motors</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Paleta de Colores Estilo Stripe (Fintech Premium Light) */
            --bg-main: #f8fafc;        /* Gris ultra claro, limpio y mate */
            --card-bg: #ffffff;        /* Blanco puro */
            --text-main: #0f172a;      /* Slate 900: Texto casi negro de alta definición */
            --text-muted: #64748b;     /* Slate 500 */
            --input-border: #e2e8f0;   /* Gris sutil para bordes */
            --input-focus: #0f172a;    /* Foco corporativo nítido */
            --btn-bg: #0f172a;         /* Botón premium sólido negro/slate */
            --btn-hover: #1e293b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            /* ELIMINADA LA CUADRÍCULA Y EL AZUL INTENSO */
            background-image: none !important;
            background-repeat: no-repeat;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 1.5rem;
        }

        .admin-card {
            background-color: var(--card-bg);
            padding: 3.5rem 2.5rem;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05), 0 20px 25px -5px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 420px;
        }

        .admin-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .brand-icon {
            width: 54px;
            height: 54px;
            background-color: #f1f5f9;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.25rem auto;
        }

        .brand-icon i {
            font-size: 1.35rem;
            color: var(--text-main);
        }

        .admin-header h1 {
            color: var(--text-main);
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.375rem;
        }

        .admin-header p {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin: 0;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: block;
            font-size: 0.688rem;
            font-weight: 700;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
            padding-left: 0.125rem;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 1rem;
            color: #94a3b8;
            font-size: 1.05rem;
            transition: color 0.15s ease;
            pointer-events: none;
        }

        .form-control-fintech {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.6rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-main);
            background-color: #ffffff;
            border: 1px solid var(--input-border);
            border-radius: 8px;
            transition: all 0.15s ease;
            outline: none;
            box-shadow: inset 0 1px 2px 0 rgba(0, 0, 0, 0.02);
        }

        .form-control-fintech::placeholder {
            color: #cbd5e1;
        }

        .form-control-fintech:focus {
            border-color: var(--input-focus);
            box-shadow: 0 0 0 3px rgba(15, 23, 42, 0.08);
        }

        .form-control-fintech:focus ~ i {
            color: var(--text-main);
        }

        .btn-auth {
            width: 100%;
            background-color: var(--btn-bg);
            color: #ffffff;
            font-weight: 600;
            font-size: 0.875rem;
            padding: 0.75rem;
            border: none;
            border-radius: 8px;
            margin-top: 1.5rem;
            transition: all 0.15s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }

        .btn-auth:hover {
            background-color: var(--btn-hover);
        }

        .btn-auth:active {
            transform: scale(0.99);
        }

        .alert-fintech {
            background-color: #fef2f2;
            border: 1px solid #fee2e2;
            color: #991b1b;
            border-radius: 8px;
            font-size: 0.813rem;
            font-weight: 500;
            padding: 0.75rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.25rem;
        }

        .footer-secure {
            margin-top: 2.5rem;
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .badge-secure {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.35rem;
            color: #059669; /* Verde Fintech de Seguridad */
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>

    <div class="admin-card">
        <div class="admin-header">
            <div class="brand-icon">
                <i class="bi bi-shield-lock-fill"></i>
            </div>
            <h1>Portal Administrativo</h1>
            <p>Acceso Seguro Restringido</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-fintech alert-dismissible fade show" role="alert">
                        <i class="bi bi-exclamation-circle-fill"></i>
                        <div>{{ message }}</div>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close" style="font-size: 0.75rem;"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('admin_login') }}">
            <div class="form-group">
                <label class="form-label" for="usuario">Usuario Corporativo</label>
                <div class="input-wrapper">
                    <input type="text" class="form-control-fintech" id="usuario" name="usuario" placeholder="Introduce tu usuario" required autocomplete="off" autofocus>
                    <i class="bi bi-person-fill"></i>
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="password">Contraseña</label>
                <div class="input-wrapper">
                    <input type="password" class="form-control-fintech" id="password" name="password" placeholder="••••••••" required>
                    <i class="bi bi-lock-fill"></i>
                </div>
            </div>

            <button type="submit" class="btn-auth">
                Ingresar al Sistema <i class="bi bi-arrow-right-short fs-5"></i>
            </button>
        </form>

        <div class="footer-secure">
            <div class="badge-secure">
                <i class="bi bi-patch-check-fill"></i> Terminal de Conexión Cifrada
            </div>
            <div>&copy; {{ anio_actual }} Moto Plan Motors C.A.</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
