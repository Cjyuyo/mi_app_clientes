<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Workspace | Moto Plan Motors</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Paleta Dark Mode Corporativo - Más Luminoso */
            --admin-bg: #0F172A; /* Slate 900 - Azul oscuro profundo y elegante, ya no es negro */
            --card-bg: rgba(30, 41, 59, 0.75); /* Slate 800 translúcido (más claro) */
            --primary-accent: #6366F1; /* Indigo Premium */
            --primary-hover: #4F46E5;
            --text-main: #FFFFFF;
            --text-muted: #CBD5E1; /* Gris mucho más claro para no cansar la vista */
            --input-bg: rgba(15, 23, 42, 0.6); /* Fondo de input más amigable */
            --input-border: rgba(71, 85, 105, 0.7); /* Borde más visible */
            --focus-ring: rgba(99, 102, 241, 0.35);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--admin-bg);
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
        }

        /* Server Glow Effects - Más grandes y brillantes */
        .glow-1 {
            position: absolute;
            top: 10%;
            left: 10%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(99,102,241,0.25) 0%, transparent 70%);
            filter: blur(50px);
            z-index: 0;
        }
        .glow-2 {
            position: absolute;
            bottom: 10%;
            right: 10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(56,189,248,0.2) 0%, transparent 70%); /* Cian brillante */
            filter: blur(60px);
            z-index: 0;
        }

        .admin-card {
            background-color: var(--card-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            padding: 3rem 2.5rem;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
            width: 100%;
            max-width: 400px;
            position: relative;
            z-index: 10;
        }

        .admin-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        .server-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, rgba(99,102,241,0.25) 0%, rgba(99,102,241,0.05) 100%);
            border: 1px solid rgba(99,102,241,0.4);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.25rem auto;
            box-shadow: 0 0 25px rgba(99,102,241,0.2);
        }
        .server-icon i {
            font-size: 1.75rem;
            color: #A5B4FC; /* Ícono más luminoso */
        }

        .admin-header h1 {
            color: var(--text-main);
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 0.25rem;
        }
        .admin-header p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin: 0;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .input-wrapper i {
            position: absolute;
            left: 1rem;
            color: #94A3B8;
            font-size: 1.1rem;
            transition: color 0.2s ease;
        }
        .form-control-dark {
            width: 100%;
            padding: 0.875rem 1rem 0.875rem 2.75rem;
            font-size: 0.95rem;
            color: var(--text-main);
            background-color: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 12px;
            transition: all 0.2s ease;
            outline: none;
        }
        .form-control-dark::placeholder {
            color: #64748B;
        }
        .form-control-dark:focus {
            background-color: rgba(15, 23, 42, 0.9);
            border-color: var(--primary-accent);
            box-shadow: 0 0 0 4px var(--focus-ring);
        }
        .form-control-dark:focus + i, .input-wrapper:focus-within i {
            color: #818CF8;
        }

        .btn-auth {
            width: 100%;
            background: linear-gradient(135deg, var(--primary-accent) 0%, var(--primary-hover) 100%);
            color: white;
            font-weight: 600;
            font-size: 0.95rem;
            padding: 0.875rem;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            margin-top: 1.5rem;
            box-shadow: 0 4px 12px rgba(99,102,241,0.3);
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .btn-auth:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 16px rgba(99,102,241,0.4);
        }

        .alert-dark {
            background-color: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.3);
            color: #FECACA;
            border-radius: 12px;
            font-size: 0.85rem;
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .footer-secure {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.8rem;
            color: #94A3B8;
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }
        .badge-secure {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.25rem;
            color: #34D399; /* Verde esmeralda más brillante */
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>
    
    <div class="glow-1"></div>
    <div class="glow-2"></div>

    <div class="admin-card">
        <div class="admin-header">
            <div class="server-icon">
                <i class="bi bi-person-workspace"></i>
            </div>
            <h1>Portal Administrativo</h1>
            <p>Acceso Restringido</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-dark alert-dismissible fade show" role="alert">
                        <i class="bi bi-exclamation-triangle-fill"></i>
                        <div>{{ message }}</div>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close" style="filter: invert(1); opacity: 0.7;"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('admin_login') }}">
            <div class="form-group">
                <label class="form-label" for="usuario">Credencial de Usuario</label>
                <div class="input-wrapper">
                    <i class="bi bi-person-fill"></i>
                    <input type="text" class="form-control-dark" id="usuario" name="usuario" placeholder="Nombre de usuario" required autocomplete="off" autofocus>
                </div>
            </div>
            
            <div class="form-group mb-2">
                <label class="form-label" for="password">Clave de Acceso</label>
                <div class="input-wrapper">
                    <i class="bi bi-lock-fill"></i>
                    <input type="password" class="form-control-dark" id="password" name="password" placeholder="••••••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn-auth">
                <i class="bi bi-fingerprint fs-5"></i> Autenticar
            </button>
        </form>

        <div class="footer-secure">
            <div class="badge-secure">
                <i class="bi bi-shield-check"></i> Conexión Cifrada SSL
            </div>
            <span>&copy; {{ anio_actual }} Moto Plan Motors C.A.</span>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
