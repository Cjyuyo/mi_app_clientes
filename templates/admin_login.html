<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Workspace | Moto Plan Motors</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Paleta Luminosa y Profesional */
            --bg-light: #F8FAFC; /* Slate 50 */
            --card-bg: #FFFFFF;
            --slate-900: #0F172A;
            --slate-800: #1E293B;
            --slate-500: #64748B;
            --slate-300: #CBD5E1;
            --slate-200: #E2E8F0;
            --accent-blue: #2563EB; /* Blue 600 */
            --focus-ring: rgba(37, 99, 235, 0.15);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            /* Patrón sutil de cuadrícula para un toque técnico */
            background-image: 
                linear-gradient(rgba(15, 23, 42, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(15, 23, 42, 0.03) 1px, transparent 1px);
            background-size: 32px 32px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
        }

        /* Efectos de luz suaves de fondo */
        .glow-1 {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(37, 99, 235, 0.08) 0%, transparent 70%);
            filter: blur(40px);
            z-index: 0;
        }
        .glow-2 {
            position: absolute;
            bottom: -10%;
            right: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(249, 148, 23, 0.05) 0%, transparent 70%);
            filter: blur(50px);
            z-index: 0;
        }

        .admin-card {
            background-color: var(--card-bg);
            padding: 3.5rem 2.5rem;
            border-radius: 24px;
            border: 1px solid var(--slate-200);
            box-shadow: 0 20px 40px -15px rgba(15, 23, 42, 0.08), 0 0 0 1px rgba(15, 23, 42, 0.02);
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 10;
        }

        .admin-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        
        .server-icon {
            width: 64px;
            height: 64px;
            background: var(--slate-900);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.25rem auto;
            box-shadow: 0 10px 25px -5px rgba(15, 23, 42, 0.3);
        }
        .server-icon i {
            font-size: 1.75rem;
            color: #FFFFFF;
        }

        .admin-header h1 {
            color: var(--slate-900);
            font-size: 1.35rem;
            font-weight: 800;
            letter-spacing: -0.025em;
            margin-bottom: 0.35rem;
        }
        .admin-header p {
            color: var(--slate-500);
            font-size: 0.9rem;
            font-weight: 500;
            margin: 0;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--slate-500);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .input-wrapper i {
            position: absolute;
            left: 1.1rem;
            color: #94A3B8;
            font-size: 1.1rem;
            transition: color 0.2s ease;
        }
        .form-control-light {
            width: 100%;
            padding: 0.875rem 1rem 0.875rem 2.85rem;
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--slate-900);
            background-color: #FFFFFF;
            border: 1px solid var(--slate-300);
            border-radius: 12px;
            transition: all 0.2s ease;
            outline: none;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }
        .form-control-light::placeholder {
            color: #94A3B8;
            font-weight: 400;
        }
        .form-control-light:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 4px var(--focus-ring);
        }
        .form-control-light:focus + i, .input-wrapper:focus-within i {
            color: var(--accent-blue);
        }

        .btn-auth {
            width: 100%;
            background: var(--slate-900);
            color: white;
            font-weight: 700;
            font-size: 0.95rem;
            padding: 0.875rem;
            border: none;
            border-radius: 12px;
            margin-top: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(15, 23, 42, 0.2), 0 2px 4px -1px rgba(15, 23, 42, 0.1);
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-auth:hover {
            background: var(--slate-800);
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(15, 23, 42, 0.25);
        }

        .alert-light {
            background-color: #FEF2F2;
            border: 1px solid #FCA5A5;
            color: #DC2626;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 500;
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }
        
        .alert-light .btn-close {
            font-size: 0.75rem;
        }

        .footer-secure {
            margin-top: 2.5rem;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
        }
        .badge-secure {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.35rem;
            color: #059669;
            background-color: #ECFDF5;
            border: 1px solid #A7F3D0;
            padding: 0.35rem 0.85rem;
            border-radius: 9999px;
            font-weight: 600;
            font-size: 0.75rem;
        }
        .footer-copyright {
            font-size: 0.75rem;
            font-weight: 500;
            color: #94A3B8;
        }
    </style>
</head>
<body>
    
    <div class="glow-1"></div>
    <div class="glow-2"></div>

    <div class="admin-card">
        <div class="admin-header">
            <div class="server-icon">
                <i class="bi bi-shield-lock-fill"></i>
            </div>
            <h1>Portal Administrativo</h1>
            <p>Acceso Restringido</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-light alert-dismissible fade show" role="alert">
                        <i class="bi bi-exclamation-triangle-fill"></i>
                        <div>{{ message }}</div>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('admin_login') }}">
            <div class="form-group">
                <label class="form-label" for="usuario">Credencial de Usuario</label>
                <div class="input-wrapper">
                    <i class="bi bi-person-fill"></i>
                    <input type="text" class="form-control-light" id="usuario" name="usuario" placeholder="Nombre de usuario" required autocomplete="off" autofocus>
                </div>
            </div>
            
            <div class="form-group mb-2">
                <label class="form-label" for="password">Clave de Acceso</label>
                <div class="input-wrapper">
                    <i class="bi bi-key-fill"></i>
                    <input type="password" class="form-control-light" id="password" name="password" placeholder="••••••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn-auth">
                Autenticar <i class="bi bi-arrow-right-short fs-5"></i>
            </button>
        </form>

        <div class="footer-secure">
            <div class="badge-secure">
                <i class="bi bi-shield-check"></i> Conexión Cifrada SSL
            </div>
            <div class="footer-copyright">
                &copy; {{ anio_actual }} Moto Plan Motors C.A.
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
