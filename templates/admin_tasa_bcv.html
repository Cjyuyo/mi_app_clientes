{% extends 'base_sidebar.html' %}

{% block title %}
    Gestión de Tasas de Cambio
{% endblock %}

{% block body %}
    <div class="main-header text-white text-center mb-4" style="background-color: var(--naranja-corporativo); border-radius: .5rem;">
        <h1><i class="bi bi-currency-exchange"></i> Gestión de Tasas de Cambio</h1>
        <p class="lead">Establece la tasa del día y consulta el historial de cambios.</p>
    </div>

    <div class="row g-4">
        <div class="col-lg-5">
            <div class="card content-card">
                <div class="card-header" style="background-color: var(--naranja-corporativo); color: white;">
                    <h5 class="mb-0">Establecer Tasa del Día</h5>
                </div>
                <div class="card-body p-4">
                    <form method="POST" action="{{ url_for('admin_tasa_bcv') }}">
                        <div class="mb-3">
                            <label for="tasa_usd" class="form-label fw-bold">Tasa Dólar (USD)</label>
                            <div class="input-group">
                                <span class="input-group-text">Bs.</span>
                                <input type="text" class="form-control" id="tasa_usd" name="tasa_usd" value="{{ tasas_de_hoy.usd if tasas_de_hoy.usd is not none else '' }}" placeholder="Ej: 36.50" required>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="tasa_eur" class="form-label fw-bold">Tasa Euro (EUR)</label>
                            <div class="input-group">
                                <span class="input-group-text">Bs.</span>
                                <input type="text" class="form-control" id="tasa_eur" name="tasa_eur" value="{{ tasas_de_hoy.eur if tasas_de_hoy.eur is not none else '' }}" placeholder="Ej: 40.20" required>
                            </div>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg" style="background-color: var(--naranja-corporativo); border-color: var(--naranja-corporativo);">Guardar Tasa</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-lg-7">
            <div class="card content-card">
                <div class="card-header" style="background-color: var(--azul-profundo-finanzas); color: white;">
                    <h5 class="mb-0">Historial Reciente (Últimos 30 días)</h5>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-striped table-hover mb-0">
                            <!-- Contenido de la tabla de historial -->
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
