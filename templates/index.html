<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Nuevo Cliente</title>
    <!-- ... (los estilos <style> no cambian) ... -->
</head>
<body>
<div class="container">
    <nav>
        <a href="/" class="active">Registrar Cliente</a>
        <a href="/consulta">Consultar Cliente</a>
    </nav>
    <h1>Registrar Nuevo Cliente</h1>
    <form method="POST">
        <div class="form-grid">
            <!-- Columna 1 -->
            <div>
                <label>Nombre y Apellido:</label><input type="text" name="nombre_apellido" required>
                <label>Nº Cédula:</label><input type="text" name="cedula" required>
                <label>Nº Contrato:</label><input type="text" name="contrato_nro" required>
                <label>Teléfono:</label><input type="text" name="telefono" required>
                <label>Asesor:</label><input type="text" name="asesor" required>
                <label>Responsable:</label><input type="text" name="responsable" required>
                <!-- CAMPO ESTANDARIZADO -->
                <label>Fecha de Ingreso:</label><input type="date" name="fecha_ingreso" required>
            </div>
            <!-- Columna 2 -->
            <div>
                <label>Grupo:</label><input type="text" name="grupo" required>
                <label>Bien solicitado:</label><input type="text" name="bien_solicitado" required>
                <label>Plan Contratado:</label><input type="text" name="plan_contratado" required>
                <label>Cuotas Totales del Plan:</label>
                <select name="cuotas_totales" required>
                    <option value="24">24 Cuotas</option>
                    <option value="36">36 Cuotas</option>
                    <option value="48">48 Cuotas</option>
                </select>
                <label>Moneda de Pago:</label>
                <select name="moneda_pago" required>
                    <option value="USD">USD</option>
                    <option value="BsBCV">BsBCV</option>
                    <option value="EuroBCV">EuroBCV</option>
                    <option value="USDT">USDT</option>
                </select>
                <label>Cuota Mensual:</label><input type="number" step="0.01" name="valor_cuota" required>
                <label>Monto de Inscripción:</label><input type="number" step="0.01" name="inscripcion_monto" required>
            </div>
            <!-- ... (resto del formulario no cambia) ... -->
        </div>
    </form>
</div>
<script>
    // ... (el script de JavaScript no cambia) ...
</script>
</body>
</html>
