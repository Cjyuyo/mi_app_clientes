<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportar Pago de Inscripción - Moto Plan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --azul-corporativo: #2B3A55;
            --naranja-corporativo: #F99417;
            --gris-fondo: #f8f9fa;
        }
        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--gris-fondo);
        }
        .container-main { max-width: 700px; margin: 2rem auto; }
        .content-card-header { 
            background-color: var(--azul-corporativo); 
            color: white; 
        }
        #campos-pago-movil, #campos-binance {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container-main">
        <div class="card content-card">
            <div class="card-header content-card-header">
                <h2 class="h5 mb-0">Reportar Pago de Inscripción</h2>
            </div>
            <div class="card-body p-4">
                <div class="alert alert-info">
                    <strong>Monto Pendiente de Inscripción:</strong> ${{ "%.2f"|format(monto_restante) }}
                </div>

                <form action="{{ url_for('portal_pagar_inscripcion') }}" method="POST" id="form-reporte-pago">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="monto" class="form-label">Monto Pagado ($)</label>
                            <input type="number" step="0.01" class="form-control" id="monto" name="monto" required>
                        </div>
                        <div class="col-md-6">
                            <label for="fecha_pago" class="form-label">Fecha del Pago</label>
                            <input type="date" class="form-control" id="fecha_pago" name="fecha_pago" required>
                        </div>
                        <div class="col-12">
                            <label for="forma_pago" class="form-label">Forma de Pago</label>
                            <select class="form-select" id="forma_pago" name="forma_pago" required>
                                <option value="" selected disabled>Selecciona una opción...</option>
                                <option value="Efectivo">Efectivo</option>
                                <option value="Pago Móvil">Pago Móvil</option>
                                <option value="Binance">Binance</option>
                                <option value="Transferencia Bancaria">Transferencia Bancaria</option>
                            </select>
                        </div>
                        <div class="col-12" id="campo-referencia">
                            <label for="referencia" class="form-label">N° de Referencia</label>
                            <input type="text" class="form-control" id="referencia" name="referencia">
                        </div>
                        <div id="campos-pago-movil" class="row g-3 mx-0">
                            <div class="col-md-6">
                                <label for="pago_movil_telefono" class="form-label">Teléfono Emisor</label>
                                <input type="tel" class="form-control" id="pago_movil_telefono" name="pago_movil_telefono">
                            </div>
                            <div class="col-md-6">
                                <label for="pago_movil_cedula" class="form-label">Cédula Emisor</label>
                                <input type="text" class="form-control" id="pago_movil_cedula" name="pago_movil_cedula">
                            </div>
                        </div>
                        <div id="campos-binance" class="col-12">
                             <label for="binance_user" class="form-label">Usuario o Email de Binance</label>
                             <input type="text" class="form-control" id="binance_user" name="binance_user">
                        </div>
                    </div>
                    <hr class="my-4">
                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="{{ url_for('portal_dashboard') }}" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary" style="background-color: var(--naranja-corporativo); border-color: var(--naranja-corporativo);">
                            <i class="bi bi-send-fill"></i> Reportar Pago
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const formaPagoSelect = document.getElementById('forma_pago');
            const campoReferencia = document.getElementById('campo-referencia');
            const camposPagoMovil = document.getElementById('campos-pago-movil');
            const camposBinance = document.getElementById('campos-binance');
            const referenciaInput = document.getElementById('referencia');
            formaPagoSelect.addEventListener('change', function() {
                const seleccion = this.value;
                campoReferencia.style.display = 'none';
                camposPagoMovil.style.display = 'none';
                camposBinance.style.display = 'none';
                document.getElementById('pago_movil_telefono').required = false;
                document.getElementById('pago_movil_cedula').required = false;
                document.getElementById('binance_user').required = false;
                if (seleccion === 'Pago Móvil') {
                    campoReferencia.style.display = 'block';
                    camposPagoMovil.style.display = 'flex';
                    referenciaInput.required = true;
                    document.getElementById('pago_movil_telefono').required = true;
                    document.getElementById('pago_movil_cedula').required = true;
                } else if (seleccion === 'Binance') {
                    campoReferencia.style.display = 'block';
                    camposBinance.style.display = 'block';
                    referenciaInput.required = true;
                    document.getElementById('binance_user').required = true;
                } else if (seleccion === 'Transferencia Bancaria') {
                    campoReferencia.style.display = 'block';
                    referenciaInput.required = true;
                } else if (seleccion === 'Efectivo') {
                    referenciaInput.required = false;
                }
            });
        });
    </script>
</body>
</html>
